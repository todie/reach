version: "3.9"

services:
  reach:
    build: .
    ports:
      - "5900:5900"
      - "6080:6080"
      - "8400:8400"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    shm_size: "2gb"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8400/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    profiles:
      - observability

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-reach}
    restart: unless-stopped
    profiles:
      - observability

volumes:
  prometheus-data:
  grafana-data:
